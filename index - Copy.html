<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div class="card">
  <div class="corner-ornament"></div>
  <div class="corner-ornament br"></div>

  <div class="header">
    <div class="eyebrow">Academic Year 2025–26</div>
    <h1>Student Registration</h1>
    <p class="sub">Fill in the details below to register.</p>
    <div class="divider"></div>
  </div>

  <form id="regForm" novalidate>
    <div class="form-grid">

      <div class="field full">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Aarav Sharma" autocomplete="name"/>
        <span class="err-msg" id="nameErr"></span>
      </div>

      <div class="field">
        <label for="studentClass">Class</label>
        <input type="text" id="studentClass" name="studentClass" placeholder="e.g. 10-A or 10"/>
        <span class="err-msg" id="classErr"></span>
      </div>

      <div class="field">
        <label for="age">Age</label>
        <input type="number" id="age" name="age" placeholder="e.g. 16" min="3" max="25"/>
        <span class="err-msg" id="ageErr"></span>
      </div>

      <div class="field full">
        <label for="subject">Favourite Subject</label>
        <div class="select-wrap">
          <select id="subject" name="subject">
            <option value="">— Select a subject —</option>
            <option value="Hindi">Hindi</option>
            <option value="English">English</option>
            <option value="Math">Math</option>
            <option value="Science">Science</option>
            <option value="Social Science">Social Science</option>
          </select>
        </div>
        <span class="err-msg" id="subjectErr"></span>
      </div>

      <div class="field full">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="e.g. aarav@school.in" autocomplete="email"/>
        <span class="err-msg" id="emailErr"></span>
      </div>

    </div><!-- /.form-grid -->

    <div class="submit-row">
      <button type="submit" id="submitBtn">Register Student</button>
    </div>
  </form>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
